<!--
  One Insight sub-block. Append inside <div class="insight-body" data-block="insight-body">.
  Replace placeholders: $slug, $title, $lead.
  Every visualization MUST be followed by a caption paragraph (the inline
  style is required by lint_analysis.py has_caption_after):
    <p class="card-text" style="font-size:0.88rem; color:#555;"><em>Reading:</em> …</p>
  Visualization snippets live in references/viz-templates.md.
-->
<details class="insight-subblock" id="insight-$slug">
  <summary>$title</summary>
  <div class="insight-subblock-body">

    <p class="card-text">$lead</p>

    <!--
      Optional: <h4 style="margin-top:1em;">Sub-heading</h4>
      Optional: ordered or unordered list of key signals
      Optional: visualization (see references/viz-templates.md) + caption
    -->

  </div>
</details>
