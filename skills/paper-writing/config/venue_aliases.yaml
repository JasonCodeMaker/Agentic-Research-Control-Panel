# Map a target-venue name to the profile that supplies its conventions.
# Unknown venues fall back to the default_profile in default_profile.yaml.

aliases:
  # ML / DL conferences -> ml_conference profile
  neurips: ml_conference
  iclr: ml_conference
  icml: ml_conference
  acl: ml_conference
  emnlp: ml_conference
  naacl: ml_conference
  cvpr: ml_conference
  iccv: ml_conference
  eccv: ml_conference
  aaai: ml_conference

  # Systems / networking venues -> systems_networking profile
  nsdi: systems_networking
  sigcomm: systems_networking
  conext: systems_networking
  imc: systems_networking
  osdi: systems_networking
  sosp: systems_networking

  # Interdisciplinary / applied ML
  interdisciplinary: interdisciplinary
