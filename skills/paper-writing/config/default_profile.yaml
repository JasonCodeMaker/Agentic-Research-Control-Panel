# Default component configuration.
# The active writing profile when a project selects none.
default_profile: ml_dl_general

# Profiles shipped under references/workflow_kernel/profiles/.
profiles:
  - ml_dl_general
  - systems_networking
  - ml_conference
  - interdisciplinary

# Corpus-conversion backend policy (see plan Layer 2A).
corpus:
  default_backend: docling
  fallback_backend: manual   # user supplies clean Markdown; manifest + readability gate only
  # Optional backends (not required for the first implementation):
  optional_backends: [pymupdf4llm, marker, mineru, markitdown]

# Section guides loaded by the audit, keyed by section.
section_guides:
  introduction: [introduction, paragraph_flow]
  abstract: [abstract, paragraph_flow]
  related_work: [related_work, paragraph_flow]
  method: [method, paragraph_flow]
  experiments: [experiments, reviewer_self_check]
  conclusion: [conclusion, paragraph_flow]
