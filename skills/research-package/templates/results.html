<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$name - Results</title>
  <link rel="stylesheet" href="../../assets/research.css">
</head>
<body data-page="results" data-package-id="$package_id">
  <a class="skip-link" href="#user-zone">Skip to main content</a>
  <div class="shell">

    <header class="masthead" data-section="masthead">
      <div class="eyebrow">research package</div>
      <h1>Results: $name</h1>
      <p class="lead">Measured outputs grouped by Experiment. Main tables open by default; ablations stay collapsed.</p>
      <div class="toolbar" data-card="package-toolbar">
        <a class="pill" href="../../index.html">Dashboard</a>
      </div>
      <div class="status-strip" data-status-strip aria-label="Package status (T2)"></div>
    </header>

    <nav class="package-nav" data-package-nav aria-label="Package pages"></nav>

    <section data-audience="user" data-section="user-zone" id="user-zone" aria-label="User zone">
      <section
        class="result-experiments"
        data-list="result-experiments"
        data-fact-projection="results"
        id="results-by-experiment"
        aria-label="Results by Experiment"
      >
        <p class="result-page-empty">No Experiments are attached to this Package.</p>
      </section>
    </section>

    <footer class="footer-note">
      <time data-field="last-updated" datetime="$last_updated">$last_updated</time>
    </footer>
  </div>

  <script>window.RESEARCH_PACKAGE_ID = "$package_id"; window.RESEARCH_ROOT_PREFIX = "../../";</script>
  <script src="../../data/research-packages.js"></script>
  <script src="../../assets/research.js"></script>
</body>
</html>
